];

let currentStage = 0;
let score = 0;
let miss = 0;
let timeLeft = 60;
let timer = null;
let found = [];

const leftPicture = document.getElementById("leftPicture");
const rightPicture = document.getElementById("rightPicture");
const stageEl = document.getElementById("stage");
const scoreEl = document.getElementById("score");
const missEl = document.getElementById("miss");
const timeEl = document.getElementById("time");
const statusEl = document.getElementById("status");

function drawStage(){
  leftPicture.innerHTML = "";
  rightPicture.innerHTML = "";
  found = [];
  score = 0;
  timeLeft = 60;

  stageEl.textContent = currentStage + 1;
  scoreEl.textContent = score;
  timeEl.textContent = timeLeft;
  statusEl.textContent = "?????3?????";
  statusEl.style.color = "#333";
  rightPicture.style.pointerEvents = "auto";

  const base = stages[currentStage];
  const right = [...base];

  let diffIndexes = getRandomIndexes(3);
  diffIndexes.forEach(i=>{
    right[i] = getDifferentEmoji(base[i]);
  });

  base.forEach((emoji,i)=>{
    addItem(leftPicture, emoji, positions[i].x, positions[i].y);
  });

  right.forEach((emoji,i)=>{
    addItem(rightPicture, emoji, positions[i].x, positions[i].y);
  });

  diffIndexes.forEach(i=>{
    const zone = document.createElement("div");
    zone.className = "zone";
    zone.dataset.id = i;
    zone.style.left = positions[i].x + "%";
    zone.style.top = positions[i].y + "%";

    zone.onclick = function(e){
      e.stopPropagation();
      if(found.includes(i)) return;

      found.push(i);
      score++;
      scoreEl.textContent = score;
      this.classList.add("found");

      statusEl.textContent = "???";
      statusEl.style.color = "#1f9d55";

      if(score === 3){
        clearInterval(timer);
        statusEl.textContent = "?????????";
        setTimeout(nextStage, 900);
      }
    };

    rightPicture.appendChild(zone);
  });

  clearInterval(timer);
  timer = setInterval(()=>{
    timeLeft--;
    timeEl.textContent = timeLeft;

    if(timeLeft <= 0){
      clearInterval(timer);
      statusEl.textContent = "??????????";
      statusEl.style.color = "#d93025";
      setTimeout(nextStage, 1000);
    }
  },1000);
}

function addItem(parent, emoji, x, y){
  const el = document.createElement("div");
  el.className = "item";
  el.textContent = emoji;
  el.style.left = x + "%";
  el.style.top = y + "%";
  parent.appendChild(el);
}

rightPicture.addEventListener("click",()=>{
  miss++;
  missEl.textContent = miss;
  statusEl.textContent = "???????";
  statusEl.style.color = "#d93025";
});

function nextStage(){
  currentStage++;

  if(currentStage >= stages.length){
    finishGame();
    return;
  }

  drawStage();
}

function finishGame(){
  clearInterval(timer);
  leftPicture.innerHTML = "";
  rightPicture.innerHTML = "";
  rightPicture.style.pointerEvents = "none";

  statusEl.innerHTML = `
    ?30?????<br>
    ?????${miss}?<br>

  statusEl.style.color = "#2f80ed";

function getRandomIndexes(count){
  const arr = [0,1,2,3,4,5];
  return arr.sort(()=>Math.random()-0.5).slice(0,count);
}

function getDifferentEmoji(original){
  const pool = ["?","?","?","?","?","?","?","?","?","?","?","?","?","?","?","?","?","??","?","?","?","?","?","?","?","?","?","?"];
  let pick = original;
  while(pick === original){
    pick = pool[Math.floor(Math.random()*pool.length)];
  }
  return pick;
}
