<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>間違い探しゲーム</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff7e6, #eaf4ff);
      text-align: center;
      color: #333;
    }

    header {
      padding: 25px 10px;
      background: #ffffffdd;
      box-shadow: 0 2px 10px #0001;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .ad {
      margin: 15px auto;
      padding: 18px;
      max-width: 520px;
      background: #f3f3f3;
      border: 2px dashed #bbb;
      border-radius: 12px;
      color: #777;
    }

    .container {
      max-width: 980px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 8px 25px #0002;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .badge {
      flex: 1;
      min-width: 120px;
      padding: 10px;
      background: #f5f7fb;
      border-radius: 12px;
    }

    .game-area {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .picture-box {
      width: 420px;
      height: 320px;
      position: relative;
      background: #dff5ff;
      border: 4px solid #333;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
    }

    .label {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .sun {
      position: absolute;
      top: 25px;
      left: 35px;
      width: 55px;
      height: 55px;
      background: #ffd54f;
      border-radius: 50%;
    }

    .cloud {
      position: absolute;
      top: 45px;
      right: 55px;
      width: 90px;
      height: 35px;
      background: white;
      border-radius: 20px;
    }

    .cloud::before {
      content: "";
      position: absolute;
      top: -20px;
      left: 15px;
      width: 45px;
      height: 45px;
      background: white;
      border-radius: 50%;
    }

    .tree {
      position: absolute;
      bottom: 55px;
      left: 45px;
    }

    .trunk {
      width: 25px;
      height: 75px;
      background: #8d5a2b;
      margin: auto;
    }

    .leaf {
      width: 90px;
      height: 90px;
      background: #3aaa35;
      border-radius: 50%;
      margin-bottom: -20px;
    }

    .house {
      position: absolute;
      bottom: 55px;
      right: 55px;
      width: 130px;
      height: 100px;
      background: #ffb74d;
    }

    .roof {
      position: absolute;
      top: -55px;
      left: -10px;
      width: 0;
      height: 0;
      border-left: 75px solid transparent;
      border-right: 75px solid transparent;
      border-bottom: 60px solid #d84315;
    }

    .door {
      position: absolute;
      bottom: 0;
      left: 50px;
      width: 32px;
      height: 55px;
      background: #6d4c41;
    }

    .window {
      position: absolute;
      top: 25px;
      right: 18px;
      width: 30px;
      height: 30px;
      background: #81d4fa;
      border: 3px solid #333;
    }

    .bird {
      position: absolute;
      top: 95px;
      left: 180px;
      font-size: 34px;
    }

    .flower {
      position: absolute;
      bottom: 35px;
      left: 195px;
      font-size: 32px;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 55px;
      background: #7ed957;
    }

    .difference-zone {
      position: absolute;
      border-radius: 50%;
      z-index: 20;
    }

    .found {
      border: 4px solid red;
      background: rgba(255, 0, 0, 0.15);
    }

    button {
      margin-top: 20px;
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      background: #2f80ed;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #1c63bd;
    }

    .status {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
      min-height: 28px;
    }

    .small {
      margin-top: 15px;
      color: #777;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .picture-box {
        width: 340px;
        height: 260px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>間違い探しゲーム</h1>
  <p>右の絵から違う場所をクリックしよう！</p>
</header>

<div class="ad">
  広告エリア
</div>

<div class="container">
  <div class="top">
    <div class="badge">見つけた数：<span id="score">0</span> / 5</div>
    <div class="badge">残り時間：<span id="time">60</span>秒</div>
    <div class="badge">ミス：<span id="miss">0</span></div>
  </div>

  <div class="game-area">
    <div>
      <div class="label">左：お手本</div>
      <div class="picture-box">
        <div class="scene">
          <div class="sun"></div>
          <div class="cloud"></div>
          <div class="bird">🐦</div>
          <div class="tree">
            <div class="leaf"></div>
            <div class="trunk"></div>
          </div>
          <div class="house">
            <div class="roof"></div>
            <div class="door"></div>
            <div class="window"></div>
          </div>
          <div class="flower">🌸</div>
          <div class="ground"></div>
        </div>
      </div>
    </div>

    <div>
      <div class="label">右：間違いを探す</div>
      <div class="picture-box" id="rightPicture">
        <div class="scene">
          <div class="sun" style="background:#ff9800;"></div>
          <div class="cloud" style="right:90px;"></div>
          <div class="bird" style="top:120px;">🐦</div>
          <div class="tree">
            <div class="leaf"></div>
            <div class="trunk" style="height:55px;"></div>
          </div>
          <div class="house">
            <div class="roof"></div>
            <div class="door"></div>
            <div class="window" style="background:#ffeb3b;"></div>
          </div>
          <div class="flower">🌼</div>
          <div class="ground"></div>

          <div class="difference-zone" data-id="1" style="top:15px; left:25px; width:75px; height:75px;"></div>
          <div class="difference-zone" data-id="2" style="top:35px; right:75px; width:120px; height:65px;"></div>
          <div class="difference-zone" data-id="3" style="top:105px; left:160px; width:70px; height:60px;"></div>
          <div class="difference-zone" data-id="4" style="bottom:90px; left:40px; width:90px; height:100px;"></div>
          <div class="difference-zone" data-id="5" style="bottom:25px; left:175px; width:70px; height:60px;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="status" id="status">違う場所は5つあります</div>

  <button onclick="restartGame()">もう一度プレイ</button>

  <div class="small">
    ※スマホでは右側の絵をタップしてください。
  </div>
</div>

<script>
  let score = 0;
  let miss = 0;
  let timeLeft = 60;
  let foundList = [];
  let timer = null;
  const totalDifferences = 5;

  const scoreEl = document.getElementById("score");
  const missEl = document.getElementById("miss");
  const timeEl = document.getElementById("time");
  const statusEl = document.getElementById("status");
  const rightPicture = document.getElementById("rightPicture");

  function startTimer() {
    timer = setInterval(() => {
      timeLeft--;
      timeEl.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timer);
        statusEl.textContent = "時間切れ！もう一度挑戦してみよう";
        statusEl.style.color = "#d93025";
        rightPicture.style.pointerEvents = "none";
      }
    }, 1000);
  }

  document.querySelectorAll(".difference-zone").forEach(zone => {
    zone.addEventListener("click", function(e) {
      e.stopPropagation();

      const id = this.dataset.id;

      if (foundList.includes(id)) return;

      foundList.push(id);
      score++;
      scoreEl.textContent = score;

      this.classList.add("found");

      statusEl.textContent = "正解！間違いを見つけました";
      statusEl.style.color = "#1f9d55";

      if (score === totalDifferences) {
        clearInterval(timer);
        statusEl.textContent = "全問発見！クリアです！";
        statusEl.style.color = "#2f80ed";
        rightPicture.style.pointerEvents = "none";
      }
    });
  });

  rightPicture.addEventListener("click", function() {
    miss++;
    missEl.textContent = miss;
    statusEl.textContent = "そこは違います";
    statusEl.style.color = "#d93025";
  });

  function restartGame() {
    location.reload();
  }

  startTimer();
</script>

</body>
</html>
